<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Planta Motor-Tacogerador</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Planta Motor-Tacogerador</h1>

    <div class="control">
        <label for="referencia">Duty Cycle (%):</label>
        <input type="number" name="referencia" id="referencia" min="0" max="3100" value="50">
        <input type="button" id="btn-referencia" value="Enviar">
        <button type="button" onclick="SalvarArquivo()">Salvar Dados</button>
    </div>

    <div class="graphs">
        <div style="width: 70%">
            <canvas id="y-chart"></canvas>
        </div>
        <div style="width: 70%;">
            <canvas id="u-chart" width="50%"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
